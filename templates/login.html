{% extends "base.html" %}
{% block content %}
<div style="max-width:400px;margin:40px auto;">
    <h2>🔑 Вход</h2>
    {% with messages = get_flashed_messages() %}
    {% if messages %}<p style="color:var(--danger);">{{ messages[0] }}</p>{% endif %}
    {% endwith %}
    <form method="post">
        <div class="form-group"><label>Логин</label><input type="text" name="username" required></div>
        <div class="form-group"><label>Пароль</label><input type="password" name="password" required></div>
        <button type="submit" class="btn btn-accent" style="width:100%;">Войти</button>
    </form>
    <p style="margin-top:12px;"><a href="/register">Регистрация</a></p>
    <p style="font-size:0.8rem;color:var(--text2);">admin / admin123 или test / test123</p>
</div>
{% endblock %}
