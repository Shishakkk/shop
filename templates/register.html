{% extends "base.html" %}
{% block content %}
<div style="max-width:400px;margin:40px auto;">
    <h2>📝 Регистрация</h2>
    {% with messages = get_flashed_messages() %}
    {% if messages %}<p style="color:var(--danger);">{{ messages[0] }}</p>{% endif %}
    {% endwith %}
    <form method="post">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username" required minlength="3">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Пароль (мин. 4 символа)</label>
            <input type="password" name="password" required minlength="4">
        </div>
        <button type="submit" class="btn btn-accent" style="width:100%;">Зарегистрироваться</button>
    </form>
    <p style="margin-top:12px;">Уже есть аккаунт? <a href="/login">Войти</a></p>
</div>
{% endblock %}
